# prometheus.yml
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'host'
    static_configs:
      - targets: ['pgo-node-exporter:9100']

  - job_name: 'docker'
    static_configs:
      - targets: ['pgo-cadvisor:8080']

