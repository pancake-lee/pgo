# prometheus.yml
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'host' # grafana 1860
    static_configs:
      - targets: ['pgo-node-exporter:9100']

  - job_name: 'docker' # grafana 14282
    static_configs:
      - targets: ['pgo-cadvisor:8080']

  # TODO Prometheus 自监控

  - job_name: 'pm2' 
    static_configs:
      - targets: ['pgo-dr9:9988'] # pm2-prom-module

